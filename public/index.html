<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klaudii — Session Manager</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/gemini.css?v=7">
</head>
<body>
  <header>
    <h1>Klaudii</h1>
    <select id="project-switcher" class="project-switcher" onchange="switchProject(this.value)" title="Switch project">
      <option value="">All Projects</option>
    </select>
    <span id="status-badge" class="badge">checking...</span>
    <div id="auth-status" class="auth-box"></div>
    <div class="agent-btns" style="margin-left:auto;display:flex;gap:0.25rem">
      <button class="btn btn-sm agent-btn architect" onclick="openAgentChat('architect')" title="Talk to the Architect agent">Architect</button>
      <button class="btn btn-sm agent-btn shepherd" onclick="openAgentChat('shepherd')" title="Talk to the Shepherd agent">Shepherd</button>
    </div>
    <button class="btn btn-sm" id="cloud-btn" onclick="openCloudModal()">Kloud Konnect</button>
    <button class="btn-theme" id="settings-btn" onclick="openSettingsModal()" title="Settings">⚙</button>
    <button class="btn-theme" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark">☀</button>
  </header>

  <div id="app-layout" class="app-layout">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab" data-tab="workers" onclick="switchSidebarTab('workers')">Workers <span class="sidebar-badge" id="sidebar-badge-workers">0</span></button>
        <button class="sidebar-tab" data-tab="beads" onclick="switchSidebarTab('beads')">Beads <span class="sidebar-badge" id="sidebar-badge-beads">0</span></button>
        <button class="sidebar-tab active" data-tab="workspaces" onclick="switchSidebarTab('workspaces')">Workspaces <span class="sidebar-badge" id="sidebar-badge-workspaces">0</span></button>
      </div>
      <div class="sidebar-content" id="sidebar-content"></div>
    </aside>
    <main>
      <section id="usage-section" class="usage-section hidden">
        <div class="usage-header">
          <span class="usage-label">token usage · 24h</span>
          <div class="usage-meta">
            <span id="usage-status" class="usage-status"></span>
            <span id="usage-total" class="usage-total"></span>
          </div>
        </div>
        <div id="usage-chart"></div>
      </section>

      <section id="sessions-section">
        <div class="sort-bar">
          <div class="sort-left">
            <span class="sort-label">Sort</span>
            <button class="sort-btn" id="sort-activity" onclick="setSort('activity')">Activity</button>
            <button class="sort-btn" id="sort-alpha" onclick="setSort('alpha')">A-Z</button>
            <button class="sort-dir-btn" id="sort-dir-btn" onclick="toggleSortDir()" title="Toggle sort direction"></button>
          </div>
          <button class="sort-btn hidden" id="worker-toggle" onclick="toggleWorkerWorkspaces()" title="Worker workspaces hidden">Workers</button>
          <button class="btn primary btn-sm" onclick="openNewSessionModal()">+ New Workspace</button>
        </div>
        <div id="sessions-list" class="card-grid"></div>
      </section>

      <section id="scheduler-section" class="hidden">
        <h2 class="scheduler-heading">
          Scheduler
          <button class="btn btn-sm" id="scheduler-toggle" onclick="toggleSchedulerSection()">Hide</button>
        </h2>
        <div id="scheduler-list" class="card-grid"></div>
      </section>

      <section id="beads-section" class="hidden">
        <h2 class="beads-heading">
          Beads
          <button class="btn btn-sm" id="beads-toggle" onclick="toggleBeadsSection()">Hide</button>
        </h2>
        <div id="beads-toolbar" class="beads-toolbar">
          <div class="beads-filters">
            <button class="beads-filter active" data-filter="all" onclick="setBeadFilter('all')">All</button>
            <button class="beads-filter" data-filter="open" onclick="setBeadFilter('open')">Open</button>
            <button class="beads-filter" data-filter="in_progress" onclick="setBeadFilter('in_progress')">In Progress</button>
            <button class="beads-filter" data-filter="blocked" onclick="setBeadFilter('blocked')">Blocked</button>
            <button class="beads-filter" data-filter="closed" onclick="setBeadFilter('closed')">Closed</button>
          </div>
          <button class="btn btn-sm primary" onclick="openBeadForm()">+ New Bead</button>
        </div>
        <div id="bead-form" class="bead-form hidden">
          <div class="form-group">
            <label>Title</label>
            <input id="bead-title" type="text" placeholder="Bead title" />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="bead-desc" rows="3" placeholder="Details..." style="width:100%;background:var(--bg-input);color:var(--text);border:1px solid var(--border-btn);border-radius:6px;padding:0.5rem 0.75rem;font-size:0.9rem;font-family:inherit;resize:vertical"></textarea>
          </div>
          <div style="display:flex;gap:0.5rem;align-items:flex-end">
            <div class="form-group" style="margin-bottom:0">
              <label>Priority</label>
              <select id="bead-priority" style="background:var(--bg-input);color:var(--text);border:1px solid var(--border-btn);border-radius:6px;padding:0.4rem 0.5rem;font-size:0.85rem">
                <option value="0">0 — Critical</option>
                <option value="1">1 — High</option>
                <option value="2" selected>2 — Medium</option>
                <option value="3">3 — Low</option>
                <option value="4">4 — Backlog</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label>Type</label>
              <select id="bead-type" style="background:var(--bg-input);color:var(--text);border:1px solid var(--border-btn);border-radius:6px;padding:0.4rem 0.5rem;font-size:0.85rem">
                <option value="task">Task</option>
                <option value="bug">Bug</option>
                <option value="feature">Feature</option>
                <option value="epic">Epic</option>
              </select>
            </div>
            <button class="btn btn-sm primary" onclick="submitBead()">Create</button>
            <button class="btn btn-sm" onclick="closeBeadForm()">Cancel</button>
          </div>
        </div>
        <div id="beads-list" class="beads-list"></div>
      </section>

      <section id="unmanaged-section" class="hidden">
        <h2>free range claudes</h2>
        <div id="unmanaged-list" class="card-grid"></div>
      </section>

    </main>

    <!-- Gemini / Claude Chat Panel -->
    <div id="gemini-overlay" class="gemini-panel hidden">
      <div class="gemini-bar">
        <span id="gemini-title" class="gemini-bar-title"></span>
        <div class="gemini-bar-actions">
          <span id="gemini-quota" class="gemini-bar-quota"></span>
          <span id="gemini-status" class="gemini-bar-status"></span>
          <select id="gemini-tool-display" class="gemini-chip-select" title="Tool display mode" onchange="geminiSetToolDisplayMode(this.value)">
            <option value="minimal">Minimal</option>
            <option value="normal" selected>Normal</option>
            <option value="full">Full</option>
          </select>
          <select id="gemini-session" class="gemini-session-select hidden" title="Session" onchange="geminiSwitchSession(Number(this.value))"></select>
          <button class="btn btn-sm" onclick="clearGeminiSession()">New Chat</button>
          <button class="btn btn-sm" onclick="closeGeminiChat()">Close</button>
        </div>
      </div>
      <div id="gemini-messages" class="gemini-messages"></div>
      <div id="gemini-image-strip" class="gemini-image-strip hidden"></div>
      <div class="gemini-input-area">
        <div class="gemini-input-card">
          <textarea id="gemini-input" rows="3" placeholder="Message Gemini..." onkeydown="geminiInputKeydown(event)"></textarea>
          <input type="file" id="gemini-file-input" accept="image/*" multiple style="display:none" onchange="geminiHandleFileInput(event)">
          <div class="gemini-input-footer">
            <button id="gemini-attach" class="gemini-attach-btn" onclick="document.getElementById('gemini-file-input').click()" title="Attach image">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <select id="gemini-model" class="gemini-chip-select" title="Model">
              <option value="">Auto</option>
            </select>
            <select id="gemini-permission-mode" class="gemini-chip-select" title="Permission Mode" style="display:none">
              <option value="bypassPermissions">Yolo</option>
              <option value="plan">Plan</option>
              <option value="allowEdits">Auto Accept Edits</option>
            </select>
            <button id="gemini-thinking-toggle" class="gemini-thinking-toggle" title="Extended Thinking" style="display:none" onclick="geminiToggleThinking()">Thinking</button>
            <span id="gemini-cumulative-stats" class="gemini-cumulative-stats"></span>
            <div class="gemini-footer-spacer"></div>
            <button id="gemini-stop" class="gemini-stop-btn" onclick="geminiStopStreaming()" title="Stop generation" style="display:none">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            </button>
            <button id="gemini-send" class="gemini-send-btn" onclick="sendGeminiMessage()">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Worker Detail Panel (slide-out) -->
  <div id="worker-detail-overlay" class="worker-detail-overlay hidden" onclick="closeWorkerDetailBackdrop(event)">
    <div class="worker-detail-panel" id="worker-detail-panel">
      <div class="worker-detail-header">
        <div class="worker-detail-title" id="worker-detail-title"></div>
        <button class="btn btn-sm" onclick="closeWorkerDetail()">X</button>
      </div>
      <div class="worker-detail-stats" id="worker-detail-stats"></div>
      <div class="worker-detail-tabs">
        <button class="worker-tab active" data-tab="task" onclick="switchWorkerTab('task')">Task</button>
        <button class="worker-tab" data-tab="activity" onclick="switchWorkerTab('activity')">Activity</button>
      </div>
      <div class="worker-detail-body" id="worker-detail-body">
        <div class="worker-detail-loading">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Bead Detail Panel (slide-out) -->
  <div id="bead-detail-overlay" class="bead-detail-overlay hidden" onclick="closeBeadDetailBackdrop(event)">
    <div class="bead-detail-panel" id="bead-detail-panel">
      <div class="bead-detail-header">
        <div class="bead-detail-id" id="bead-detail-id"></div>
        <button class="btn btn-sm" onclick="closeBeadDetail()">X</button>
      </div>
      <div class="bead-detail-body" id="bead-detail-body">
        <div class="bead-detail-loading">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Setup overlay -->
  <div id="setup-overlay" class="setup-overlay hidden" onclick="closeSetupOverlay(event)">
    <iframe id="setup-frame" class="setup-frame" src=""></iframe>
  </div>

  <!-- Full-screen terminal overlay -->
  <div id="terminal-overlay" class="terminal-overlay hidden">
    <div class="terminal-bar">
      <span id="terminal-title" class="terminal-bar-title"></span>
      <div class="terminal-bar-actions" id="terminal-bar-actions"></div>
    </div>
    <iframe id="terminal-frame" src=""></iframe>
  </div>

  <!-- New Session Modal -->
  <div id="new-session-modal" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>New Workspace</h2>
        <button class="btn btn-sm" onclick="closeNewSessionModal()">X</button>
      </div>
      <div class="modal-body">
        <!-- Repo search view (default) -->
        <div id="repo-search-view">
          <div class="form-group">
            <label>Repository</label>
            <input id="repo-search" type="text" placeholder="Search repos..." oninput="filterRepos()" />
            <div id="repo-list" class="repo-list"></div>
            <button class="btn btn-sm btn-link" onclick="showCreateRepoForm()">+ Create new repo</button>
          </div>
          <div id="branch-form" class="form-group hidden">
            <label>Branch name</label>
            <input id="branch-input" type="text" placeholder="e.g. fix-auth-bug" />
            <div class="form-hint">A new git worktree will be created with this branch.</div>
            <button class="btn primary" onclick="createNewSession()" id="create-session-btn">Create Workspace</button>
          </div>
        </div>
        <!-- Create new repo view -->
        <div id="create-repo-view" class="hidden">
          <div class="form-group">
            <label>Repo name</label>
            <input id="new-repo-name" type="text" placeholder="e.g. my-project" />
          </div>
          <div class="form-group">
            <label>Remote origin URL <span class="form-hint-inline">(optional)</span></label>
            <input id="new-repo-remote" type="text" placeholder="e.g. git@github.com:user/my-project.git" />
          </div>
          <div class="form-actions">
            <button class="btn" onclick="showRepoSearchView()">Back</button>
            <button class="btn primary" onclick="createNewRepo()" id="create-repo-btn">Create Repo</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Git Status Modal -->
  <div id="git-status-modal" class="modal-overlay hidden" onclick="closeGitStatusBackdrop(event)">
    <div class="modal">
      <div class="modal-header">
        <h2 id="git-status-title">git status</h2>
        <button class="btn btn-sm" onclick="closeGitStatus()">X</button>
      </div>
      <div class="modal-body" id="git-status-body"></div>
    </div>
  </div>

  <!-- Cloud Connect Modal -->
  <div id="cloud-modal" class="modal-overlay hidden" onclick="closeCloudBackdrop(event)">
    <div class="modal">
      <div class="modal-header">
        <h2 id="cloud-modal-title">Kloud Konnect</h2>
        <button class="btn btn-sm" onclick="closeCloudModal()">X</button>
      </div>
      <div class="modal-body" id="cloud-modal-body"></div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay hidden" onclick="closeSettingsBackdrop(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="btn btn-sm" onclick="closeSettingsModal()">X</button>
      </div>
      <div class="modal-body" id="settings-modal-body"></div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script src="/vendor/marked.min.js"></script>
  <script src="/gemini.js?v=28"></script>
</body>
</html>
