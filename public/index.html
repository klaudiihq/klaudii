<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klaudii — Session Manager</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><defs><linearGradient id='kg' x1='256' y1='80' x2='256' y2='432' gradientUnits='userSpaceOnUse'><stop offset='0%25' stop-color='%2386efac'/><stop offset='50%25' stop-color='%234ade80'/><stop offset='100%25' stop-color='%2322c55e'/></linearGradient></defs><rect x='132' y='100' width='40' height='312' rx='20' fill='url(%23kg)'/><line x1='188' y1='256' x2='362' y2='120' stroke='url(%23kg)' stroke-width='40' stroke-linecap='round'/><line x1='188' y1='256' x2='362' y2='392' stroke='url(%23kg)' stroke-width='40' stroke-linecap='round'/></svg>">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/chat.css?v=7">
</head>
<body>
  <header>
    <a class="nav-logo" href="/">
      <svg class="nav-logo-icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- dark theme: vivid lime → deep forest -->
          <linearGradient id="lg-dark" x1="256" y1="80" x2="256" y2="432" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#4ade80"/>
            <stop offset="100%" stop-color="#15803d"/>
          </linearGradient>
          <!-- light theme: deep forest → vivid green -->
          <linearGradient id="lg-light" x1="256" y1="80" x2="256" y2="432" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#15803d"/>
            <stop offset="100%" stop-color="#4ade80"/>
          </linearGradient>
        </defs>
        <rect x="132" y="100" width="40" height="312" rx="20" fill="url(#lg-dark)" class="k-dark" /><rect x="132" y="100" width="40" height="312" rx="20" fill="url(#lg-light)" class="k-light" />
        <line x1="188" y1="256" x2="362" y2="120" stroke="url(#lg-dark)" stroke-width="40" stroke-linecap="round" class="k-dark"/><line x1="188" y1="256" x2="362" y2="120" stroke="url(#lg-light)" stroke-width="40" stroke-linecap="round" class="k-light"/>
        <line x1="188" y1="256" x2="362" y2="392" stroke="url(#lg-dark)" stroke-width="40" stroke-linecap="round" class="k-dark"/><line x1="188" y1="256" x2="362" y2="392" stroke="url(#lg-light)" stroke-width="40" stroke-linecap="round" class="k-light"/>
      </svg>
      <span>Klaudii</span>
    </a>
    <span id="status-badge" class="badge">checking...</span>
    <div id="auth-status" class="auth-box"></div>
    <div style="margin-left:auto"></div>
    <button class="header-chip" id="cloud-btn" onclick="openCloudModal()">Kloud Konnect</button>
    <span class="header-gear" onclick="openSettingsModal()" title="Settings">⚙</span>
  </header>

  <div id="app-layout" class="app-layout">
    <aside id="sidebar" class="sidebar">
      <select id="project-switcher" class="project-switcher" onchange="switchProject(this.value)" title="Switch project">
        <option value="">All Projects</option>
      </select>
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="workspaces" onclick="switchSidebarTab('workspaces')">Workspaces <span class="sidebar-badge" id="sidebar-badge-workspaces">0</span></button>
        <button class="sidebar-tab" data-tab="tasks" onclick="switchSidebarTab('tasks')">Tasks <span class="sidebar-badge" id="sidebar-badge-tasks">0</span></button>
      </div>
      <div class="sidebar-content" id="sidebar-content"></div>
    </aside>
    <main>
      <section id="usage-section" class="usage-section hidden">
        <div class="usage-header">
          <span class="usage-label">token usage · 24h</span>
          <div class="usage-meta">
            <span id="usage-status" class="usage-status"></span>
            <span id="usage-total" class="usage-total"></span>
          </div>
        </div>
        <div id="usage-chart"></div>
      </section>

      <section id="sessions-section">
        <div class="sort-bar">
          <div class="sort-left">
            <span class="sort-label">Sort</span>
            <button class="sort-btn" id="sort-activity" onclick="setSort('activity')">Activity</button>
            <button class="sort-btn" id="sort-alpha" onclick="setSort('alpha')">A-Z</button>
            <button class="sort-dir-btn" id="sort-dir-btn" onclick="toggleSortDir()" title="Toggle sort direction"></button>
          </div>
          <button class="sort-btn hidden" id="worker-toggle" onclick="toggleWorkerWorkspaces()" title="Worker workspaces hidden">Workers</button>
          <button class="btn primary btn-sm" onclick="openNewSessionModal()">+ New Workspace</button>
        </div>
        <div id="sessions-list" class="card-grid"></div>
      </section>

      <section id="scheduler-section" class="hidden">
        <h2 class="scheduler-heading">
          Scheduler
          <button class="btn btn-sm" id="scheduler-toggle" onclick="toggleSchedulerSection()">Hide</button>
        </h2>
        <div id="scheduler-list" class="card-grid"></div>
      </section>

      <section id="tasks-section" class="hidden">
        <h2 class="tasks-heading">
          Tasks
          <button class="btn btn-sm" id="tasks-toggle" onclick="toggleTasksSection()">Hide</button>
        </h2>
        <div id="tasks-toolbar" class="tasks-toolbar">
          <div class="tasks-filters">
            <button class="tasks-filter active" data-filter="all" onclick="setTaskFilter('all')">All</button>
            <button class="tasks-filter" data-filter="open" onclick="setTaskFilter('open')">Open</button>
            <button class="tasks-filter" data-filter="in_progress" onclick="setTaskFilter('in_progress')">In Progress</button>
            <button class="tasks-filter" data-filter="blocked" onclick="setTaskFilter('blocked')">Blocked</button>
            <button class="tasks-filter" data-filter="closed" onclick="setTaskFilter('closed')">Closed</button>
          </div>
          <button class="btn btn-sm primary" onclick="openTaskForm()">+ New Task</button>
        </div>
        <div id="task-form" class="task-form hidden">
          <div class="form-group">
            <label>Title</label>
            <input id="task-title" type="text" placeholder="Task title" />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="task-desc" rows="3" placeholder="Details..." style="width:100%;background:var(--bg-input);color:var(--text);border:1px solid var(--border-btn);border-radius:6px;padding:0.5rem 0.75rem;font-size:0.9rem;font-family:inherit;resize:vertical"></textarea>
          </div>
          <div style="display:flex;gap:0.5rem;align-items:flex-end">
            <div class="form-group" style="margin-bottom:0">
              <label>Priority</label>
              <select id="task-priority" style="background:var(--bg-input);color:var(--text);border:1px solid var(--border-btn);border-radius:6px;padding:0.4rem 0.5rem;font-size:0.85rem">
                <option value="0">0 — Critical</option>
                <option value="1">1 — High</option>
                <option value="2" selected>2 — Medium</option>
                <option value="3">3 — Low</option>
                <option value="4">4 — Backlog</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label>Type</label>
              <select id="task-type" style="background:var(--bg-input);color:var(--text);border:1px solid var(--border-btn);border-radius:6px;padding:0.4rem 0.5rem;font-size:0.85rem">
                <option value="task">Task</option>
                <option value="bug">Bug</option>
                <option value="feature">Feature</option>
                <option value="epic">Epic</option>
              </select>
            </div>
            <button class="btn btn-sm primary" onclick="submitTask()">Create</button>
            <button class="btn btn-sm" onclick="closeTaskForm()">Cancel</button>
          </div>
        </div>
        <div id="tasks-list" class="tasks-list"></div>
      </section>

      <section id="unmanaged-section" class="hidden">
        <h2>free range claudes</h2>
        <div id="unmanaged-list" class="card-grid"></div>
      </section>

    </main>

    <!-- Gemini / Claude Chat Panel -->
    <div id="chat-overlay" class="chat-panel hidden">
      <div class="chat-bar">
        <span id="chat-title" class="chat-bar-title"></span>
        <div class="chat-bar-actions">
          <span id="chat-quota" class="chat-bar-quota"></span>
          <span id="chat-status" class="chat-bar-status"></span>
          <div id="chat-session-dropdown" class="chat-session-dropdown">
            <button id="chat-session-btn" class="chat-session-btn" onclick="chatToggleSessionMenu()">
              <span id="chat-session-label">Chat 1</span>
              <svg class="chat-session-chevron" xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0l5 6 5-6z" fill="#888"/></svg>
            </button>
            <div id="chat-session-menu" class="chat-session-menu hidden"></div>
          </div>
          <button class="btn btn-sm" onclick="chatShowHandoffPreview()" title="Preview handoff briefing">Handoff</button>
          <button class="btn btn-sm" onclick="closeGeminiChat()" title="Close chat" style="font-size:16px;line-height:1;padding:2px 6px;">&times;</button>
        </div>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <div id="chat-image-strip" class="chat-image-strip hidden"></div>
      <div class="chat-input-area">
        <div class="chat-input-card">
          <textarea id="chat-input" rows="3" placeholder="Message..." onkeydown="chatInputKeydown(event)"></textarea>
          <input type="file" id="chat-file-input" accept="image/*" multiple style="display:none" onchange="chatHandleFileInput(event)">
          <div class="chat-input-footer">
            <button id="chat-attach" class="chat-attach-btn" onclick="document.getElementById('chat-file-input').click()" title="Attach image">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <select id="chat-model" class="chat-chip-select" title="Model">
              <option value="">Auto</option>
            </select>
            <select id="chat-permission-mode" class="chat-chip-select" title="Permission Mode" style="display:none">
              <option value="bypassPermissions">Yolo</option>
              <option value="plan">Plan</option>
              <option value="allowEdits">Auto Accept Edits</option>
            </select>
            <button id="chat-thinking-toggle" class="chat-thinking-toggle" title="Extended Thinking" style="display:none" onclick="chatToggleThinking()">Thinking</button>
            <span id="chat-cumulative-stats" class="chat-cumulative-stats"></span>
            <div class="chat-footer-spacer"></div>
            <button id="chat-stop" class="chat-stop-btn" onclick="chatStopStreaming()" title="Stop generation" style="display:none">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            </button>
            <button id="chat-send" class="chat-send-btn" onclick="sendGeminiMessage()">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Worker Detail Panel (slide-out) -->
  <div id="worker-detail-overlay" class="worker-detail-overlay hidden" onclick="closeWorkerDetailBackdrop(event)">
    <div class="worker-detail-panel" id="worker-detail-panel">
      <div class="worker-detail-header">
        <div class="worker-detail-title" id="worker-detail-title"></div>
        <button class="btn btn-sm" onclick="closeWorkerDetail()">X</button>
      </div>
      <div class="worker-detail-stats" id="worker-detail-stats"></div>
      <div class="worker-detail-tabs">
        <button class="worker-tab active" data-tab="task" onclick="switchWorkerTab('task')">Task</button>
        <button class="worker-tab" data-tab="activity" onclick="switchWorkerTab('activity')">Activity</button>
      </div>
      <div class="worker-detail-body" id="worker-detail-body">
        <div class="worker-detail-loading">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Task Detail Panel (slide-out) -->
  <div id="task-detail-overlay" class="task-detail-overlay hidden" onclick="closeTaskDetailBackdrop(event)">
    <div class="task-detail-panel" id="task-detail-panel">
      <div class="task-detail-header">
        <div class="task-detail-id" id="task-detail-id"></div>
        <button class="btn btn-sm" onclick="closeTaskDetail()">X</button>
      </div>
      <div class="task-detail-body" id="task-detail-body">
        <div class="task-detail-loading">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Setup overlay -->
  <div id="setup-overlay" class="setup-overlay hidden" onclick="closeSetupOverlay(event)">
    <iframe id="setup-frame" class="setup-frame" src=""></iframe>
  </div>

  <!-- Full-screen terminal overlay -->
  <div id="terminal-overlay" class="terminal-overlay hidden">
    <div class="terminal-bar">
      <span id="terminal-title" class="terminal-bar-title"></span>
      <div class="terminal-bar-actions" id="terminal-bar-actions"></div>
    </div>
    <iframe id="terminal-frame" src=""></iframe>
  </div>

  <!-- New Session Modal -->
  <div id="new-session-modal" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>New Workspace</h2>
        <button class="btn btn-sm" onclick="closeNewSessionModal()">X</button>
      </div>
      <div class="modal-body">
        <!-- Repo search view (default) -->
        <div id="repo-search-view">
          <div class="form-group">
            <label>Repository</label>
            <input id="repo-search" type="text" placeholder="Search repos..." oninput="filterRepos()" />
            <div id="repo-list" class="repo-list"></div>
            <button class="btn btn-sm btn-link" onclick="showCreateRepoForm()">+ Create new repo</button>
          </div>
          <div id="branch-form" class="form-group hidden">
            <label>Branch name</label>
            <input id="branch-input" type="text" placeholder="e.g. fix-auth-bug" />
            <div class="form-hint">A new git worktree will be created with this branch.</div>
            <button class="btn primary" onclick="createNewSession()" id="create-session-btn">Create Workspace</button>
          </div>
        </div>
        <!-- Create new repo view -->
        <div id="create-repo-view" class="hidden">
          <div class="form-group">
            <label>Repo name</label>
            <input id="new-repo-name" type="text" placeholder="e.g. my-project" />
          </div>
          <div class="form-group">
            <label>Remote origin URL <span class="form-hint-inline">(optional)</span></label>
            <input id="new-repo-remote" type="text" placeholder="e.g. git@github.com:user/my-project.git" />
          </div>
          <div class="form-actions">
            <button class="btn" onclick="showRepoSearchView()">Back</button>
            <button class="btn primary" onclick="createNewRepo()" id="create-repo-btn">Create Repo</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Git Status Modal -->
  <div id="git-status-modal" class="modal-overlay hidden" onclick="closeGitStatusBackdrop(event)">
    <div class="modal">
      <div class="modal-header">
        <h2 id="git-status-title">git status</h2>
        <button class="btn btn-sm" onclick="closeGitStatus()">X</button>
      </div>
      <div class="modal-body" id="git-status-body"></div>
    </div>
  </div>

  <!-- Cloud Connect Modal -->
  <div id="cloud-modal" class="modal-overlay hidden" onclick="closeCloudBackdrop(event)">
    <div class="modal">
      <div class="modal-header">
        <h2 id="cloud-modal-title">Kloud Konnect</h2>
        <button class="btn btn-sm" onclick="closeCloudModal()">X</button>
      </div>
      <div class="modal-body" id="cloud-modal-body"></div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay hidden" onclick="closeSettingsBackdrop(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="btn btn-sm" onclick="closeSettingsModal()">X</button>
      </div>
      <div class="modal-body" id="settings-modal-body"></div>
    </div>
  </div>

  <div id="handoff-modal" class="modal-overlay hidden" onclick="if(event.target===event.currentTarget)closeHandoffModal()">
    <div class="modal" style="max-width:720px">
      <div class="modal-header">
        <h2>Handoff Briefing Preview</h2>
        <button class="btn btn-sm" onclick="closeHandoffModal()">X</button>
      </div>
      <div class="modal-body" id="handoff-modal-body" style="font-family:var(--font-mono,monospace);font-size:0.82rem;white-space:pre-wrap;line-height:1.5"></div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script src="/vendor/marked.min.js"></script>
  <script src="/chat.js?v=29"></script>
</body>
</html>
