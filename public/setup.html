<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klaudii — Setting up</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --green-mid: #4ade80;
    --text: #e4e4ed;
    --text-muted: #8888a0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    /* subtle grid */
    background-image:
      linear-gradient(rgba(255,255,255,0.013) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.013) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* ── Background stream ─────────────────────────────────────────── */
  #bg-stream {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, transparent 30%, black 100%);
    mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, transparent 30%, black 100%);
  }
  #bg-stream-inner {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 3rem;
    font-family: "JetBrains Mono", "SF Mono", ui-monospace, monospace;
    font-size: 10px;
    line-height: 1.7;
    color: rgba(134, 239, 172, 0.09);
    white-space: pre-wrap;
    word-break: break-all;
    transition: none;
  }

  /* ── Main content ──────────────────────────────────────────────── */
  #content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
  }

  /* ── Wordmark ──────────────────────────────────────────────────── */
  .wordmark {
    display: flex;
    align-items: center;
    gap: 0px;
    line-height: 1;
  }

  .wordmark-k {
    height: 148px;
    width: auto;
    display: block;
    filter: drop-shadow(0 0 28px rgba(74, 222, 128, 0.45))
            drop-shadow(0 0 8px rgba(134, 239, 172, 0.25));
  }

  .wordmark-text {
    font-size: 118px;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: #ffffff;
    line-height: 1;
    margin-left: -3px;
    position: relative;
    top: 4px;
  }

  .wordmark-text .wm-k {
    background: linear-gradient(180deg, #86efac 0%, #4ade80 50%, #22c55e 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Status area ───────────────────────────────────────────────── */
  #status-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* ── Bouncing dots ─────────────────────────────────────────────── */
  #dots {
    display: flex;
    gap: 10px;
    align-items: center;
    padding-bottom: 4px; /* room above for upward bounce */
  }

  #dots span {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    display: block;
    animation: dot-bounce 1.2s ease-in-out infinite;
  }

  #dots span:nth-child(odd)  { background: var(--green-mid); }
  #dots span:nth-child(even) { background: #ffffff; }

  #dots span:nth-child(1) { animation-delay: 0s;    }
  #dots span:nth-child(2) { animation-delay: 0.2s;  }
  #dots span:nth-child(3) { animation-delay: 0.4s;  }
  #dots span:nth-child(4) { animation-delay: 0.6s;  }
  #dots span:nth-child(5) { animation-delay: 0.8s;  }

  @keyframes dot-bounce {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0);   }
    30%           { opacity: 1;   transform: translateY(-6px); }
  }

  /* ── Status label ──────────────────────────────────────────────── */
  #status-label {
    font-size: 15px;
    color: var(--text);
    letter-spacing: 0.01em;
    min-height: 22px;
    transition: opacity 0.3s;
  }

  /* ── Error card ────────────────────────────────────────────────── */
  #error-card {
    display: none;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 13px;
    color: #f87171;
    max-width: 420px;
    text-align: center;
    line-height: 1.5;
  }

  /* ── Ready state ───────────────────────────────────────────────── */
  #ready-msg {
    display: none;
    font-size: 14px;
    color: var(--green-mid);
    animation: fade-in 0.6s ease;
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="bg-stream"><div id="bg-stream-inner"></div></div>

<div id="content">

  <!-- Wordmark -->
  <div class="wordmark">
    <!-- K lettermark from brand/icon.svg, background rect removed -->
    <svg class="wordmark-k" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="kg" x1="512" y1="160" x2="512" y2="864" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#86efac"/>
          <stop offset="50%"  stop-color="#4ade80"/>
          <stop offset="100%" stop-color="#22c55e"/>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="24" result="blur"/>
          <feFlood flood-color="#4ade80" flood-opacity="0.35"/>
          <feComposite in2="blur" operator="in" result="colorblur"/>
          <feMerge>
            <feMergeNode in="colorblur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <g filter="url(#glow)">
        <rect x="264" y="200" width="80" height="624" rx="40" fill="url(#kg)"/>
        <line x1="376" y1="512" x2="724" y2="240" stroke="url(#kg)" stroke-width="80" stroke-linecap="round"/>
        <line x1="376" y1="512" x2="724" y2="784" stroke="url(#kg)" stroke-width="80" stroke-linecap="round"/>
      </g>
    </svg>
    <span class="wordmark-text">Klaudii</span>
  </div>

  <!-- Status -->
  <div id="status-area">
    <div id="dots"><span></span><span></span><span></span><span></span><span></span></div>
    <div id="status-label">Checking...</div>
    <div id="error-card"></div>
    <div id="ready-msg">All set — returning to dashboard…</div>
  </div>

</div>

<script>
// ---------------------------------------------------------------------------
// DOM refs
// ---------------------------------------------------------------------------
const statusLabel  = document.getElementById("status-label");
const errorCard    = document.getElementById("error-card");
const readyMsg     = document.getElementById("ready-msg");
const bgInner      = document.getElementById("bg-stream-inner");

// ---------------------------------------------------------------------------
// Background stream byte tracking (drives dot speed only)
// ---------------------------------------------------------------------------
let bytesThisTick = 0;

// ---------------------------------------------------------------------------
// Background stream text
// ---------------------------------------------------------------------------
const MAX_BG_CHARS = 12000;

function appendBgText(text) {
  bgInner.textContent += text;
  if (bgInner.textContent.length > MAX_BG_CHARS) {
    bgInner.textContent = bgInner.textContent.slice(-MAX_BG_CHARS + 2000);
  }
  // Stick to bottom
  const parent = bgInner.parentElement;
  parent.scrollTop = parent.scrollHeight;
}

// ---------------------------------------------------------------------------
// State render
// ---------------------------------------------------------------------------
function applyFullState(state) {
  if (state.currentDep) {
    statusLabel.textContent = `Installing ${state.currentDep}...`;
  } else if (!state.limpMode) {
    showReady();
  } else {
    statusLabel.textContent = "Checking...";
  }
  if (state.log) appendBgText(state.log);
}

function showReady() {
  statusLabel.style.opacity = "0";
  document.getElementById("dots").style.opacity = "0";
  readyMsg.style.display    = "block";
  root.style.setProperty("--pulse-dur",    "1.2s");
  root.style.setProperty("--glow-opacity", "0.7");
  root.style.setProperty("--glow-spread",  "48px");
  // Notify parent dashboard to close the overlay, otherwise navigate directly
  setTimeout(() => {
    if (window.parent !== window) {
      window.parent.postMessage({ type: "setup-complete" }, "*");
    } else {
      window.location.href = "/";
    }
  }, 1800);
}

// ---------------------------------------------------------------------------
// SSE connection
// ---------------------------------------------------------------------------
function connect() {
  const es = new EventSource("/api/setup/stream");

  es.addEventListener("state", (e) => {
    applyFullState(JSON.parse(e.data));
  });

  es.addEventListener("depStatus", (e) => {
    const { id, status, label, message } = JSON.parse(e.data);
    if (status === "installing") {
      statusLabel.textContent = `Installing ${id}...`;
    } else if (status === "error") {
      errorCard.style.display = "block";
      errorCard.textContent   = message || `Failed to install ${label}.`;
    }
  });

  es.addEventListener("output", (e) => {
    const { text } = JSON.parse(e.data);
    bytesThisTick += text.length;
    appendBgText(text);
  });

  es.addEventListener("ready", () => {
    showReady();
  });

  es.addEventListener("limpMode", (e) => {
    const { message } = JSON.parse(e.data);
    statusLabel.textContent = message || "A dependency went missing.";
  });

  es.onerror = () => {
    // Reconnect is automatic with EventSource
  };
}

// ---------------------------------------------------------------------------
// Boot: ask server to start installing, then open the stream
// ---------------------------------------------------------------------------
fetch("/api/setup/install", { method: "POST" })
  .catch(() => {}) // fire-and-forget
  .finally(connect);
</script>
</body>
</html>
