<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klaudii</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Klaudii</h1>
      <span id="status-badge" class="badge">connecting...</span>
    </div>
    <div class="header-actions">
      <button id="btn-dashboard" class="icon-btn" title="Open full dashboard">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M2 2h5v5H2V2zm7 0h5v5H9V2zM2 9h5v5H2V9zm7 0h5v5H9V9z" opacity="0.8"/>
        </svg>
      </button>
      <button id="btn-refresh" class="icon-btn" title="Refresh now">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M13.65 2.35A7.96 7.96 0 008 0C3.58 0 0 3.58 0 8s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 018 14 6 6 0 118 2c1.66 0 3.14.69 4.22 1.78L9 7h7V0l-2.35 2.35z" transform="scale(0.9) translate(1,1)"/>
        </svg>
      </button>
      <button id="btn-settings" class="icon-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 10a2 2 0 100-4 2 2 0 000 4zm6.32-1.9l1.1-.64a.5.5 0 00.18-.68l-1-1.73a.5.5 0 00-.68-.18l-1.1.64a5.07 5.07 0 00-.86-.5V3.88a.5.5 0 00-.5-.5h-2a.5.5 0 00-.5.5v1.27a5.07 5.07 0 00-.86.5l-1.1-.64a.5.5 0 00-.68.18l-1 1.73a.5.5 0 00.18.68l1.1.64a5.23 5.23 0 000 1l-1.1.64a.5.5 0 00-.18.68l1 1.73a.5.5 0 00.68.18l1.1-.64c.27.2.56.37.86.5v1.27a.5.5 0 00.5.5h2a.5.5 0 00.5-.5v-1.27c.3-.13.6-.3.86-.5l1.1.64a.5.5 0 00.68-.18l1-1.73a.5.5 0 00-.18-.68l-1.1-.64a5.23 5.23 0 000-1z" transform="scale(0.85) translate(1.2,1.2)"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="connection-error" class="connection-error hidden">
    <span>Cannot reach Klaudii</span>
    <button class="btn btn-sm" id="btn-configure">Configure URL</button>
  </div>

  <div id="sessions-container"></div>

  <div id="unmanaged-section" class="hidden">
    <h2 class="section-title">free range claudes</h2>
    <div id="unmanaged-container"></div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
