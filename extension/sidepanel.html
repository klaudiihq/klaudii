<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klaudii</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header>
    <div class="header-left">
      <span id="status-badge" class="badge">connecting...</span>
    </div>
    <div class="header-actions">
      <button id="btn-add" class="icon-btn" title="Add workspace">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 1.5a.5.5 0 01.5.5v5.5H14a.5.5 0 010 1H8.5V14a.5.5 0 01-1 0V8.5H2a.5.5 0 010-1h5.5V2a.5.5 0 01.5-.5z"/>
        </svg>
      </button>
      <button id="btn-dashboard" class="icon-btn" title="Open full dashboard">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M2 2h5v5H2V2zm7 0h5v5H9V2zM2 9h5v5H2V9zm7 0h5v5H9V9z" opacity="0.8"/>
        </svg>
      </button>
      <button id="btn-refresh" class="icon-btn" title="Refresh now">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M13.65 2.35A7.96 7.96 0 008 0C3.58 0 0 3.58 0 8s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 018 14 6 6 0 118 2c1.66 0 3.14.69 4.22 1.78L9 7h7V0l-2.35 2.35z" transform="scale(0.9) translate(1,1)"/>
        </svg>
      </button>
      <button id="btn-settings" class="icon-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 15.5A3.5 3.5 0 018.5 12 3.5 3.5 0 0112 8.5a3.5 3.5 0 013.5 3.5 3.5 3.5 0 01-3.5 3.5m7.43-2.92c.04-.34.07-.68.07-1.08 0-.4-.03-.74-.07-1.08l2.34-1.82-2.25-3.9-2.76 1.11a7.97 7.97 0 00-1.86-1.08l-.42-2.93H9.52l-.42 2.93a7.97 7.97 0 00-1.86 1.08L4.48 5.28l-2.25 3.9 2.34 1.82A8.29 8.29 0 004.5 12c0 .38.03.74.07 1.08l-2.34 1.82 2.25 3.9 2.76-1.11c.58.42 1.2.77 1.86 1.08l.42 2.93h4.5l.42-2.93a7.97 7.97 0 001.86-1.08l2.76 1.11 2.25-3.9-2.34-1.82z"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="connection-error" class="connection-error hidden">
    <span>Cannot reach Klaudii</span>
    <button class="btn btn-sm" id="btn-configure">Configure URL</button>
  </div>

  <div class="sort-bar">
    <span class="sort-label">Sort</span>
    <button class="sort-btn active" id="sort-activity" data-sort="activity">Activity</button>
    <button class="sort-btn" id="sort-alpha" data-sort="alpha">A–Z</button>
  </div>

  <div id="add-workspace-form" class="add-form hidden">

    <!-- Step 1: repo search / select -->
    <div id="add-step-repo">
      <input id="add-repo-q" class="add-input" type="text" placeholder="Search repos..." autocomplete="off" />
      <div id="add-repo-list" class="add-repo-list"></div>
      <div class="add-actions">
        <button class="btn btn-sm" id="btn-add-newrepo">+ New repo</button>
        <button class="btn btn-sm" id="btn-add-cancel">Cancel</button>
      </div>
    </div>

    <!-- Step 1b: create a new repo -->
    <div id="add-step-newrepo" class="hidden">
      <input id="add-newrepo-name" class="add-input" type="text" placeholder="Repo name" autocomplete="off" />
      <input id="add-newrepo-remote" class="add-input" type="text" placeholder="Remote URL (optional)" autocomplete="off" />
      <div class="add-actions">
        <button class="btn primary btn-sm" id="btn-add-createrepo">Create</button>
        <button class="btn btn-sm" id="btn-add-backfromnewrepo">Back</button>
      </div>
    </div>

    <!-- Step 2: branch name -->
    <div id="add-step-branch" class="hidden">
      <div id="add-repo-label" class="add-repo-label"></div>
      <input id="add-branch-input" class="add-input" type="text" placeholder="Branch name" autocomplete="off" />
      <div class="add-actions">
        <button class="btn primary btn-sm" id="btn-add-start">Start Session</button>
        <button class="btn btn-sm" id="btn-add-backtorepo">Back</button>
      </div>
    </div>

  </div>

  <div id="sessions-container"></div>

  <div id="unmanaged-section" class="hidden">
    <h2 class="section-title">free range claudes</h2>
    <div id="unmanaged-container"></div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
