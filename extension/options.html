<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Klaudii Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      padding: 20px;
      min-width: 360px;
    }

    h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #1a1d25;
      color: #e0e0e0;
      border: 1px solid #3a3d45;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      font-family: monospace;
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
    }

    .hint {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      font-size: 12px;
      padding: 6px 14px;
      border: 1px solid #3a3d45;
      border-radius: 6px;
      background: #2a2d35;
      color: #e0e0e0;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover { background: #3a3d45; }
    .btn.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    .btn.primary:hover { background: #1d4ed8; }
    .btn.success { background: #166534; border-color: #166534; color: #fff; }

    #status {
      margin-top: 12px;
      font-size: 12px;
      min-height: 18px;
    }

    .status-ok { color: #4ade80; }
    .status-err { color: #f87171; }
  </style>
</head>
<body>
  <h1>Klaudii Settings</h1>

  <label for="url-input">Klaudii Instance URL</label>
  <input id="url-input" type="url" placeholder="http://localhost:9876" />
  <div class="hint">The URL where your Klaudii server is running.</div>

  <div class="actions">
    <button class="btn primary" id="btn-save">Save</button>
    <button class="btn" id="btn-test">Test Connection</button>
  </div>

  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
