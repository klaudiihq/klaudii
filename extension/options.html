<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Klaudii Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      padding: 20px;
      min-width: 360px;
    }

    h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      background: #1a1d25;
      color: #e0e0e0;
      border: 1px solid #3a3d45;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      font-family: monospace;
    }

    textarea {
      resize: vertical;
      min-height: 64px;
      line-height: 1.5;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #2563eb;
    }

    .hint {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      font-size: 12px;
      padding: 6px 14px;
      border: 1px solid #3a3d45;
      border-radius: 6px;
      background: #2a2d35;
      color: #e0e0e0;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover { background: #3a3d45; }
    .btn.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    .btn.primary:hover { background: #1d4ed8; }
    .btn.success { background: #166534; border-color: #166534; color: #fff; }

    #status {
      margin-top: 12px;
      font-size: 12px;
      min-height: 18px;
    }

    .status-ok { color: #4ade80; }
    .status-err { color: #f87171; }

    .section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #2a2d35;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 2px;
    }

    .radio-opt {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid #2a2d35;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .radio-opt:hover { border-color: #3a3d45; }

    .radio-opt input[type="radio"] {
      width: auto;
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: #2563eb;
    }

    .radio-opt input[type="radio"]:checked + .radio-text strong {
      color: #fff;
    }

    .radio-opt:has(input:checked) {
      border-color: #2563eb;
      background: #0f1520;
    }

    .radio-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .radio-text strong {
      font-size: 12px;
      font-weight: 600;
      color: #ccc;
    }

    .radio-text small {
      font-size: 11px;
      color: #555;
      line-height: 1.4;
    }

    .toggle-opt {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid #2a2d35;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
      text-transform: none;
      letter-spacing: normal;
      color: #e0e0e0;
    }

    .toggle-opt:hover { border-color: #3a3d45; }

    .toggle-opt:has(input:checked) {
      border-color: #2563eb;
      background: #0f1520;
    }

    .toggle-opt input[type="checkbox"] {
      width: auto;
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: #2563eb;
    }

    .toggle-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .toggle-title {
      font-size: 12px;
      font-weight: 600;
      color: #ccc;
    }

    .toggle-opt:has(input:checked) .toggle-title { color: #fff; }

    .toggle-desc {
      font-size: 11px;
      color: #555;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>Klaudii Settings</h1>

  <label for="url-input">Local Klaudii Server URLs</label>
  <textarea id="url-input" rows="3" placeholder="http://localhost:9876"></textarea>
  <div class="hint">One URL per line. Kloud Konnect servers are discovered automatically when you're logged in.</div>

  <div class="section">
    <label>When clicking "Open"</label>
    <div class="radio-group">
      <label class="radio-opt">
        <input type="radio" name="openMode" value="inplace">
        <span class="radio-text">
          <strong>Navigate in place</strong>
          <small>Replaces the current tab with the session's claude.ai page</small>
        </span>
      </label>
      <label class="radio-opt">
        <input type="radio" name="openMode" value="tabs">
        <span class="radio-text">
          <strong>Switch tabs</strong>
          <small>Each session opens in its own tab; clicking "Open" switches to it</small>
        </span>
      </label>
    </div>
  </div>

  <div class="section">
    <label>Attention</label>
    <label class="toggle-opt">
      <input type="checkbox" id="attention-flash">
      <span class="toggle-text">
        <span class="toggle-title">Get my attention when Claude is waiting</span>
        <span class="toggle-desc">Flash the session tile when Claude needs your approval</span>
      </span>
    </label>
  </div>

  <div class="actions">
    <button class="btn primary" id="btn-save">Save</button>
    <button class="btn" id="btn-test">Test Connection</button>
  </div>

  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
