app = "klaudii-cloud-relay-staging"
primary_region = "sjc"

[build]
  dockerfile = "konnect/server/Dockerfile"

[env]
  NODE_ENV = "staging"
  PORT = "3000"
  DB_PATH = "/data/relay.db"
  RELAY_WS_URL = "wss://staging.konnect.klaudii.com/ws"
  GOOGLE_REDIRECT_URI = "https://staging.konnect.klaudii.com/auth/google/callback"
  APPLE_REDIRECT_URI = "https://staging.konnect.klaudii.com/auth/apple/callback"
  # Sensitive Apple secrets → set via: fly secrets set -a klaudii-cloud-relay-staging APPLE_CLIENT_ID=... APPLE_TEAM_ID=... APPLE_KEY_ID=... APPLE_PRIVATE_KEY=...

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 250

[[mounts]]
  source = "klaudii_staging_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
