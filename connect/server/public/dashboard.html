<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klaudii — Kloud Konnect</title>
  <link rel="stylesheet" href="/konnect.css">
  <link rel="stylesheet" href="/dashboard/style.css">
</head>
<body>
  <!-- Pairing code modal -->
  <div id="pair-modal" class="pair-modal-overlay" style="display:none">
    <div class="pair-modal">
      <h2>Pairing Code</h2>
      <p class="pair-modal-sub">Enter this in your local Klaudii to konnect</p>
      <div class="pairing-code-display">
        <div class="code" id="pair-modal-code"></div>
        <div class="expires" id="pair-modal-expires"></div>
      </div>
      <ul class="pair-steps">
        <li><span class="pair-step-num">1</span>Open <strong>http://localhost:9876</strong> on your home machine</li>
        <li><span class="pair-step-num">2</span>Click the <strong>Kloud Konnect</strong> button in the header</li>
        <li><span class="pair-step-num">3</span>Enter the code above and click <strong>Pair</strong></li>
        <li><span class="pair-step-num">4</span>Scan the QR code that appears to complete the konnection</li>
      </ul>
      <div class="pair-modal-footer">
        <button class="btn btn-sm btn-ghost" onclick="closePairModal()">Done</button>
      </div>
    </div>
  </div>

  <!-- Server picker view -->
  <div id="picker-view">
    <header>
      <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
        <defs><linearGradient id="kg" x1="256" y1="80" x2="256" y2="432" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#86efac"/><stop offset="50%" stop-color="#4ade80"/><stop offset="100%" stop-color="#22c55e"/>
        </linearGradient></defs>
        <path d="M176 80 L176 432 L224 432 L224 288 L336 432 L400 432 L272 268 L384 80 L320 80 L224 244 L224 80 Z" fill="url(#kg)"/>
      </svg>
      <h1>Klaudii</h1>
      <span id="user-name" class="badge">...</span>
      <button class="btn btn-sm btn-ghost" onclick="logout()" style="margin-left:auto">Sign Out</button>
    </header>

    <div class="server-picker">
      <h2>
        Your Servers
        <button class="btn btn-sm btn-primary" onclick="addServer()">+ Add Server</button>
      </h2>
      <div id="server-list"></div>
    </div>
  </div>

  <!-- Dashboard view (when a server is selected) -->
  <div id="dashboard-view" style="display:none">
    <div class="cloud-header">
      <button class="back-btn" onclick="backToServers()">Back</button>
      <span class="server-label" id="active-server-name"></span>
      <span class="user-info" id="active-user-name"></span>
    </div>
    <iframe id="dashboard-frame" src=""></iframe>
  </div>

  <script src="/cloud.js"></script>
  <script>
    let currentUser = null;
    let currentServerId = null;

    async function init() {
      try {
        const resp = await fetch("/auth/me");
        if (!resp.ok) {
          window.location.href = "/";
          return;
        }
        currentUser = await resp.json();
        document.getElementById("user-name").textContent = currentUser.name || currentUser.email;
        loadServers();
      } catch {
        window.location.href = "/";
      }
    }

    async function loadServers() {
      const resp = await fetch("/api/servers");
      const servers = await resp.json();
      const list = document.getElementById("server-list");

      if (servers.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <h3>No servers konnected</h3>
            <p>Add your first Klaudii server to access it from anywhere.</p>
            <div class="pair-action">
              <button class="btn btn-primary" onclick="addServer()">Add Server</button>
            </div>
          </div>
        `;
        return;
      }

      list.innerHTML = servers.map(s => {
        const hasKey = hasConnectionKey(s.id);
        const lastSeen = s.lastSeen ? formatTimeAgo(s.lastSeen * 1000) : "never";
        const clickAction = s.online && hasKey ? `selectServer('${s.id}', '${esc(s.name)}')` : (!hasKey ? `enterKey('${s.id}')` : "");
        return `
          <div class="server-card" onclick="${clickAction}">
            <div style="flex:1; min-width:0">
              <div class="server-name">${esc(s.name)}</div>
              <div class="server-meta">${s.online ? "Online" : `Last seen ${lastSeen}`}</div>
              ${!hasKey ? '<div class="no-key-warning">Konnection key needed — click to enter</div>' : ""}
            </div>
            <div style="display:flex; align-items:center; gap:0.75rem; flex-shrink:0">
              <div class="status-dot ${s.online ? "online" : "offline"}"></div>
              <button class="delete-server-btn" onclick="event.stopPropagation(); deleteServer('${s.id}', '${esc(s.name)}')" title="Remove server">&#x2715;</button>
            </div>
          </div>
        `;
      }).join("");
    }

    async function deleteServer(id, name) {
      if (!confirm(`Remove "${name}"? This cannot be undone.`)) return;
      // Also remove stored connection key
      const keys = JSON.parse(localStorage.getItem("klaudii-connection-keys") || "{}");
      delete keys[id];
      localStorage.setItem("klaudii-connection-keys", JSON.stringify(keys));
      await fetch(`/api/servers/${id}`, { method: "DELETE" });
      loadServers();
    }

    function hasConnectionKey(serverId) {
      const keys = JSON.parse(localStorage.getItem("klaudii-connection-keys") || "{}");
      return !!keys[serverId];
    }

    function getConnectionKey(serverId) {
      const keys = JSON.parse(localStorage.getItem("klaudii-connection-keys") || "{}");
      return keys[serverId] || null;
    }

    async function addServer() {
      const btn = document.querySelector('[onclick="addServer()"]');
      if (btn) { btn.disabled = true; btn.textContent = "Generating..."; }
      try {
        const resp = await fetch("/api/pairing/create", { method: "POST" });
        const { code, expiresIn } = await resp.json();
        document.getElementById("pair-modal-code").textContent = code;
        document.getElementById("pair-modal-expires").textContent =
          `Expires in ${Math.floor(expiresIn / 60)} minutes`;
        document.getElementById("pair-modal").style.display = "flex";
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = "+ Add Server"; }
      }
    }

    function closePairModal() {
      document.getElementById("pair-modal").style.display = "none";
      loadServers();
    }

    function enterKey(serverId) {
      window.location.href = `/pair.html?serverId=${serverId}`;
    }

    function selectServer(serverId, serverName) {
      currentServerId = serverId;
      document.getElementById("active-server-name").textContent = serverName;
      document.getElementById("active-user-name").textContent = currentUser.name || currentUser.email;

      // Initialize the encrypted WebSocket tunnel
      const key = getConnectionKey(serverId);
      if (!key) {
        enterKey(serverId);
        return;
      }

      document.getElementById("picker-view").style.display = "none";
      document.getElementById("dashboard-view").style.display = "block";

      // Start the cloud tunnel and load the dashboard
      initCloudTunnel(serverId, key, currentUser.id);
    }

    function backToServers() {
      currentServerId = null;
      disconnectCloudTunnel();
      document.getElementById("dashboard-view").style.display = "none";
      document.getElementById("picker-view").style.display = "";
      document.getElementById("dashboard-frame").src = "";
      loadServers();
    }

    async function logout() {
      await fetch("/auth/logout", { method: "POST" });
      window.location.href = "/";
    }

    function esc(str) {
      const el = document.createElement("span");
      el.textContent = str;
      return el.innerHTML;
    }

    function formatTimeAgo(ts) {
      const diff = Date.now() - ts;
      const min = Math.floor(diff / 60000);
      if (min < 1) return "just now";
      if (min < 60) return `${min}m ago`;
      const hr = Math.floor(min / 60);
      if (hr < 24) return `${hr}h ago`;
      return `${Math.floor(hr / 24)}d ago`;
    }

    init();
  </script>
</body>
</html>
