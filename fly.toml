app = "klaudii-cloud-relay"
primary_region = "sjc"

[build]
  dockerfile = "konnect/server/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DB_PATH = "/data/relay.db"
  RELAY_WS_URL = "wss://konnect.klaudii.com/ws"
  GOOGLE_REDIRECT_URI = "https://konnect.klaudii.com/auth/google/callback"
  APPLE_REDIRECT_URI = "https://konnect.klaudii.com/auth/apple/callback"
  # Sensitive Apple secrets → set via: fly secrets set -a klaudii-cloud-relay APPLE_CLIENT_ID=... APPLE_TEAM_ID=... APPLE_KEY_ID=... APPLE_PRIVATE_KEY=...

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 250

# Persistent volume for SQLite database
[[mounts]]
  source = "klaudii_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
