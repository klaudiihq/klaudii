app = "klaudii-www-staging"
primary_region = "sjc"

[build]
  dockerfile = "www/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 250

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
