<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background depth gradient -->
    <radialGradient id="bg" cx="50%" cy="44%" r="60%">
      <stop offset="0%" stop-color="#161922"/>
      <stop offset="100%" stop-color="#0F1117"/>
    </radialGradient>

    <!-- K mark gradient (unified across all strokes) -->
    <linearGradient id="kg" x1="512" y1="160" x2="512" y2="864" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="50%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>

    <!-- Glow behind the K -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="24" result="blur"/>
      <feFlood flood-color="#4ade80" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in" result="colorblur"/>
      <feMerge>
        <feMergeNode in="colorblur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (iOS applies rounded mask automatically) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- K lettermark -->
  <g filter="url(#glow)">
    <!-- Vertical bar -->
    <rect x="264" y="200" width="80" height="624" rx="40" fill="url(#kg)"/>
    <!-- Upper arm -->
    <line x1="376" y1="512" x2="724" y2="240" stroke="url(#kg)" stroke-width="80" stroke-linecap="round"/>
    <!-- Lower arm -->
    <line x1="376" y1="512" x2="724" y2="784" stroke="url(#kg)" stroke-width="80" stroke-linecap="round"/>
  </g>
</svg>
