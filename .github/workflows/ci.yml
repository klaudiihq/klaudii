name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-server:
    name: Server Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  test-relay:
    name: Relay Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd konnect/server && npm ci
      - run: cd konnect/server && npm test
