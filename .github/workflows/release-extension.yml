name: Release Extension Zip

on:
  push:
    branches: [main]
    paths:
      - "extension/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-server:
    name: Server Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  release:
    needs: test-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%d)
          BUILD_HASH=$(git rev-parse --short HEAD)
          echo "window.BUILD_INFO = { date: '${BUILD_DATE}', hash: '${BUILD_HASH}' };" > extension/build-info.js
          cd extension
          zip -r ../klaudii-extension.zip . \
            --exclude "generate-icons.*" \
            --exclude "*/__MACOSX/*" \
            --exclude "*/.DS_Store"

      - name: Delete existing 'latest' release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Publish new 'latest' release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "Klaudii Extension — latest build" \
            --notes "Auto-built from the latest commit to \`main\`. See the [installation instructions](https://github.com/${{ github.repository }}/tree/main/extension#installation) in the extension README." \
            klaudii-extension.zip
